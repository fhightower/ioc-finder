version: '3.4'

services:
  _base:
    &base
    build:
      dockerfile: Dockerfile
      context: .
    volumes:
      - ./:/code
      - ~/.gitconfig:/root/.gitconfig

  dev:
    <<: *base
    command: uv run ipython

  mkdocs:
    <<: *base
    ports:
      - "8000:8000"
    command: ["uv", "run", "mkdocs", "serve", "--dev-addr=0.0.0.0:8000"]

  test:
    <<: *base
    command: uv run pytest

  test-benchmarks:
    <<: *base
    # the `-c "."` prevents pytest from using the config specified in the pyproject.toml (which we don't want to use for benchmarks)
    command: uv run pytest -c "." --benchmark-storage=.benchmarks/Linux-CPython-3.10-64bit/ --benchmark-compare=0001 --benchmark-compare-fail=mean:10% --benchmark-columns='mean,median,stddev,iqr' tests/benchmarks.py

  update-benchmarks:
    <<: *base
    command: >
      bash -c "
        uv run pytest -c '.' --benchmark-storage=.benchmarks/ --benchmark-save=benchmark tests/benchmarks.py &&
        mv .benchmarks/Linux-CPython-3.10-64bit/0002_benchmark.json .benchmarks/Linux-CPython-3.10-64bit/0001_benchmark.json"

  lint:
    <<: *base
    entrypoint: ./docker/lint.sh
    environment:
      # this is used in ./docker/lint.sh to determine whether or not the lint step should fail if there files were...
      # changed by black/isort. You can change this value to "ci" to test how the lint step will run in...
      # the ci pipeline.
      CONTEXT: local
